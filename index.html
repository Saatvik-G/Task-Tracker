<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Task Tracker</title>
    <meta name="description" content="A clean, simple task tracker. Add tasks, set deadlines, track progress.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-icon">✅</span>
                <div>
                    <h2>TaskFlow</h2>
                    <p class="brand-sub">Task tracker</p>
                </div>
            </div>

            <!-- Progress -->
            <div class="stats-panel">
                <h3>My Progress</h3>
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="110" height="110">
                        <circle class="progress-ring__circle-bg" stroke="#2d3142" stroke-width="8" fill="transparent" r="46" cx="55" cy="55"/>
                        <circle class="progress-ring__circle" stroke="url(#pg)" stroke-width="8" fill="transparent" r="46" cx="55" cy="55"/>
                        <defs>
                            <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#a78bfa" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="progress-text">
                        <span id="completion-percentage">0%</span>
                        <small>done</small>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-num" id="stat-total">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="stat-pending">0</span>
                        <span class="stat-label">Active</span>
                    </div>
                </div>
            </div>

            <!-- Category Filters -->
            <nav class="filters-nav">
                <h3>Filter by Category</h3>
                <button class="filter-btn active" data-filter="all">📋 All Tasks</button>
                <button class="filter-btn" data-filter="study">📚 Study</button>
                <button class="filter-btn" data-filter="assignment">📝 Assignment</button>
                <button class="filter-btn" data-filter="personal">🏠 Personal</button>
                <button class="filter-btn" data-filter="health">❤️ Health</button>
                <button class="filter-btn" data-filter="work">💼 Work</button>
                <button class="filter-btn" data-filter="other">📌 Other</button>
            </nav>

            <!-- Footer byline -->
            <div class="sidebar-footer">
                <p>Built by <strong>Saatvik Gupta</strong></p>
                <a href="https://github.com/Saatvik-G/Task-Tracker" target="_blank">GitHub ↗</a>
                <p class="project-note">Web Tech Project · July 2026</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-title">
                    <h1 id="greeting">My Tasks</h1>
                    <p id="current-date"></p>
                </div>
                <div class="header-actions">
                    <!-- Search -->
                    <div class="search-bar">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" placeholder="Search tasks...">
                    </div>
                    <!-- Date filter -->
                    <div class="date-filter-group">
                        <label for="date-filter">Due:</label>
                        <select id="date-filter">
                            <option value="all">Any date</option>
                            <option value="today">Today</option>
                            <option value="week">This week</option>
                            <option value="overdue">Overdue</option>
                        </select>
                    </div>
                    <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
                </div>
            </header>

            <!-- Board Columns -->
            <div class="board-columns">
                <!-- To Do -->
                <div class="board-column">
                    <div class="column-header">
                        <span class="dot dot-todo"></span>
                        <h2>To Do</h2>
                        <span class="task-count" id="count-todo">0</span>
                    </div>
                    <div class="task-list" id="list-todo">
                        <div class="empty-state" id="empty-todo">
                            No tasks yet — add your first one 👆
                        </div>
                    </div>
                </div>

                <!-- In Progress -->
                <div class="board-column">
                    <div class="column-header">
                        <span class="dot dot-progress"></span>
                        <h2>In Progress</h2>
                        <span class="task-count" id="count-progress">0</span>
                    </div>
                    <div class="task-list" id="list-in-progress">
                        <div class="empty-state" id="empty-progress">
                            Nothing in progress yet
                        </div>
                    </div>
                </div>

                <!-- Done -->
                <div class="board-column">
                    <div class="column-header">
                        <span class="dot dot-done"></span>
                        <h2>Done</h2>
                        <span class="task-count" id="count-done">0</span>
                    </div>
                    <div class="task-list" id="list-done">
                        <div class="empty-state" id="empty-done">
                            Completed tasks show up here
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add / Edit Task Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Task</h2>
                <button class="close-modal-btn" id="close-modal">✕</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title-input">Task title *</label>
                    <input type="text" id="task-title-input" placeholder="e.g. Finish assignment 3" required autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="study">📚 Study</option>
                            <option value="assignment">📝 Assignment</option>
                            <option value="personal">🏠 Personal</option>
                            <option value="health">❤️ Health</option>
                            <option value="work">💼 Work</option>
                            <option value="other">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-due-date">Due date</label>
                    <input type="date" id="task-due-date">
                </div>
                <div class="form-group">
                    <label for="task-desc">Notes (optional)</label>
                    <textarea id="task-desc" rows="3" placeholder="Any extra details..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-task">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
