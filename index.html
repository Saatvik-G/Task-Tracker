<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Track Your Tasks</title>
    <meta name="description" content="A simple task tracker anyone can use. Add tasks, set deadlines, track progress. No sign-up needed.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome screen (first visit) -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-card">
            <div class="welcome-icon">&#9889;</div>
            <h1>Welcome to TaskFlow</h1>
            <p>A quick way to keep track of what you need to get done. Your tasks are saved right here in your browser — no account needed.</p>
            <div class="welcome-form">
                <label for="welcome-name">What's your name?</label>
                <div class="welcome-input-row">
                    <input type="text" id="welcome-name" placeholder="e.g. Rahul" maxlength="30" autocomplete="off">
                    <button id="welcome-go-btn" class="btn btn-accent">Let's go</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main app -->
    <div id="app-container" class="app-wrapper" style="display:none;">

        <!-- Top bar -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="topbar-logo">&#9889;</span>
                <span class="topbar-brand">TaskFlow</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-user" id="topbar-user">User</span>
                <button id="change-name-btn" class="icon-btn" title="Change name">&#9998;</button>
                <button id="clear-data-btn" class="icon-btn danger" title="Clear all data">&#128465;</button>
            </div>
        </header>

        <!-- Greeting + stats row -->
        <section class="hero-section">
            <div class="hero-greeting">
                <h1 id="greeting">Good evening!</h1>
                <p id="current-date"></p>
            </div>
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-number" id="stat-total">0</span>
                    <span class="stat-name">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-active">0</span>
                    <span class="stat-name">Active</span>
                </div>
                <div class="stat-card accent">
                    <span class="stat-number" id="stat-done-pct">0%</span>
                    <span class="stat-name">Done</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-overdue">0</span>
                    <span class="stat-name">Overdue</span>
                </div>
            </div>
        </section>

        <!-- Controls row: search + category chips + date filter + add button -->
        <section class="controls-section">
            <div class="controls-top">
                <div class="search-box">
                    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
                <div class="controls-right-group">
                    <div class="date-filter-wrap">
                        <label for="date-filter">Due:</label>
                        <select id="date-filter">
                            <option value="all">Any date</option>
                            <option value="today">Today</option>
                            <option value="week">This week</option>
                            <option value="overdue">Overdue</option>
                        </select>
                    </div>
                    <button id="add-task-btn" class="btn btn-accent">+ New Task</button>
                </div>
            </div>
            <div class="category-chips" id="category-chips">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="study">&#128218; Study</button>
                <button class="chip" data-filter="assignment">&#128221; Assignment</button>
                <button class="chip" data-filter="work">&#128188; Work</button>
                <button class="chip" data-filter="personal">&#127968; Personal</button>
                <button class="chip" data-filter="health">&#10084;&#65039; Health</button>
                <button class="chip" data-filter="other">&#128204; Other</button>
            </div>
        </section>

        <!-- Status tabs -->
        <section class="tabs-section">
            <div class="tabs">
                <button class="tab active" data-tab="all">All <span class="tab-count" id="tab-count-all">0</span></button>
                <button class="tab" data-tab="todo">To Do <span class="tab-count" id="tab-count-todo">0</span></button>
                <button class="tab" data-tab="in-progress">In Progress <span class="tab-count" id="tab-count-progress">0</span></button>
                <button class="tab" data-tab="done">Done <span class="tab-count" id="tab-count-done">0</span></button>
            </div>
        </section>

        <!-- Task list -->
        <section class="task-section">
            <div id="task-list" class="task-list"></div>
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Built by <strong>Saatvik Gupta</strong> &middot; <a href="https://github.com/Saatvik-G/Task-Tracker" target="_blank">GitHub</a> &middot; Web Tech Project, July 2026</p>
        </footer>
    </div>

    <!-- Add / Edit Task Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Task</h2>
                <button class="close-modal-btn" id="close-modal">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title-input">Task title *</label>
                    <input type="text" id="task-title-input" placeholder="e.g. Finish chapter 5 notes" required autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="study">&#128218; Study</option>
                            <option value="assignment">&#128221; Assignment</option>
                            <option value="work">&#128188; Work</option>
                            <option value="personal">&#127968; Personal</option>
                            <option value="health">&#10084;&#65039; Health</option>
                            <option value="other">&#128204; Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-due-date">Due date</label>
                    <input type="date" id="task-due-date">
                </div>
                <div class="form-group">
                    <label for="task-desc">Notes (optional)</label>
                    <textarea id="task-desc" rows="3" placeholder="Any extra details..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="cancel-task">Cancel</button>
                    <button type="submit" class="btn btn-accent">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
